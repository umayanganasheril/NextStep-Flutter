name: nextstep
description: "NextStep - Career guidance app for computing undergraduates"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  file_picker: ^8.0.0+1
  percent_indicator: ^4.2.3
  image_picker: ^1.1.2
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  http: ^1.2.2
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  path: ^1.9.1
  syncfusion_flutter_pdf: ^33.2.3
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
